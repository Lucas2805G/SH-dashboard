<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Semáforo de Silencio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            text-align: center; 
            padding: 20px; 
            color: #333;
        }
        h1 { color: #2c3e50; }
        
        .panel {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            min-width: 250px; 
        }
        
        .valor { 
            font-size: 3em; 
            font-weight: bold; 
            margin: 10px 0;
            color: #3498db; 
        }
        
        .chart-container { 
            width: 90%; 
            max-width: 800px;
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
    </style>
</head>
<body>

    <h1>Monitoreo - Semáforo de Silencio</h1>
    
    <div class="panel">
        <div class="card">
            <h3>Nivel de Ruido Actual</h3>
            <div class="valor" id="ruidoActual">--</div>
            <p style="color: #7f8c8d; font-size: 0.9em;">Actualizado cada 3s</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="graficoRuido"></canvas>
    </div>

    <script>
        // Datos de Adafruit IO proporcionados por Dylan
        const username = "DylanPointis";
        const feed = "tpsemafororuido";
        
        // Endpoints de la API
        const apiLast = `https://io.adafruit.com/api/v2/${username}/feeds/${feed}/data/last`;
        const apiHistory = `https://io.adafruit.com/api/v2/${username}/feeds/${feed}/data`;

        let chartRuido;

        // Función para obtener el dato en tiempo real
        async function obtenerNivelActual() {
            try {
                const response = await fetch(apiLast);
                const data = await response.json();
                
                const valorActual = document.getElementById('ruidoActual');
                valorActual.innerText = data.value;

                // Cambiar el color del texto según los umbrales del código C++ de Dylan
                if(data.value >= 1300) {
                    valorActual.style.color = "#e74c3c"; // Rojo
                } else if (data.value >= 600) {
                    valorActual.style.color = "#f1c40f"; // Amarillo
                } else {
                    valorActual.style.color = "#2ecc71"; // Verde
                }
            } catch (error) {
                console.error("Error obteniendo el dato actual:", error);
            }
        }

        // Función para obtener el historial y dibujar el gráfico
        async function obtenerHistorial() {
            try {
                // Traemos los últimos 20 registros
                const response = await fetch(`${apiHistory}?limit=20`);
                const data = await response.json();
                
                // Adafruit devuelve los datos del más nuevo al más viejo. Los invertimos para el gráfico.
                data.reverse();

                const etiquetas = data.map(d => {
                    const fecha = new Date(d.created_at);
                    return `${fecha.getHours().toString().padStart(2, '0')}:${fecha.getMinutes().toString().padStart(2, '0')}:${fecha.getSeconds().toString().padStart(2, '0')}`;
                });
                
                const valores = data.map(d => d.value);

                actualizarGrafico(etiquetas, valores);
            } catch (error) {
                console.error("Error obteniendo datos para el gráfico:", error);
            }
        }

        function actualizarGrafico(etiquetas, valores) {
            const ctx = document.getElementById('graficoRuido').getContext('2d');
            
            if (chartRuido) {
                // Si el gráfico ya existe, solo actualizamos los datos para que fluya sin parpadear
                chartRuido.data.labels = etiquetas;
                chartRuido.data.datasets[0].data = valores;
                chartRuido.update('none'); // Update sin animación pesada
            } else {
                // Crear el gráfico por primera vez
                chartRuido = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: etiquetas,
                        datasets: [{
                            label: 'Nivel de Ruido',
                            data: valores,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.2)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3 // Curvas suaves
                        }]
                    },
                    options: {
                        responsive: true,
                        animation: false,
                        scales: {
                            y: { 
                                beginAtZero: true,
                                suggestedMax: 2000 // Escala sugerida basada en los umbrales
                            }
                        }
                    }
                });
            }
        }

        // Ejecutar inmediatamente al cargar la página
        obtenerNivelActual();
        obtenerHistorial();

        // Actualizar automáticamente cada 3 segundos (coincidiendo con el delay del ESP32)
        setInterval(() => {
            obtenerNivelActual();
            obtenerHistorial();
        }, 3000);

    </script>
</body>
</html>
