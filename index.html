<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Semáforo de Silencio</title>
    <!-- Truco de cache busting para forzar al navegador a leer la PWA de cero -->
    <link rel="manifest" href="manifest.json?v=4">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        /* Variables base (Modo Oscuro) */
        :root {
            --bg-base: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --status-green: #10b981;
            --status-yellow: #f59e0b;
            --status-red: #ef4444;
            --status-offline: #64748b;
            --card-border: #334155;
        }

        /* Variables Modo Proyector (Modo Claro) */
        body.light-theme {
            --bg-base: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-blue: #0284c7;
            --card-border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); color: var(--text-main); margin: 0; padding: 20px; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        
        body.alerta-critica { animation: bg-alerta 1s infinite alternate; }
        @keyframes bg-alerta { from { background-color: var(--bg-base); } to { background-color: rgba(239, 68, 68, 0.1); } }

        .header { text-align: center; margin-bottom: 20px; padding-top: 10px; position: relative; }
        .header h1 { margin: 0; font-weight: 800; font-size: 2.2rem; letter-spacing: -0.5px; color: var(--text-main); }
        .header p { margin: 5px 0 15px 0; color: var(--accent-blue); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }

        .global-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }
        .btn-control { background-color: var(--bg-card); color: var(--text-main); border: 1px solid var(--card-border); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-control:hover { filter: brightness(1.2); }
        .btn-control.activo { border-color: var(--status-green); color: var(--status-green); }
        
        .control-umbral { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 6px 14px; border-radius: 8px; border: 1px solid var(--card-border); font-size: 0.85rem; font-weight: 600; }
        .control-umbral input { width: 45px; background: transparent; color: var(--text-main); border: 1px solid var(--text-muted); border-radius: 4px; padding: 2px 5px; text-align: center; font-weight: bold; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background-color: var(--bg-card); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; justify-content: space-between; transition: all 0.3s ease; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        .valor-principal { font-size: 3.5rem; font-weight: 800; line-height: 1; margin-bottom: 5px; color: var(--text-main); transition: color 0.3s; }
        .valor-secundario { font-size: 2rem; font-weight: 600; color: var(--text-main); }
        .unidad { font-size: 1rem; font-weight: 400; color: var(--text-muted); }
        .estado-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.1); }
        
        .graficos-container { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; grid-column: 1 / -1; }
        @media (max-width: 768px) { .graficos-container { grid-template-columns: 1fr; } }
        
        .chart-card { height: 370px; display: flex; flex-direction: column; }
        .chart-container { position: relative; flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; }
        
        .pulsar-verde { color: var(--status-green); text-shadow: 0 0 15px rgba(16,185,129,0.4); }
        .pulsar-amarillo { color: var(--status-yellow); text-shadow: 0 0 15px rgba(245,158,11,0.4); }
        .pulsar-rojo { color: var(--status-red); text-shadow: 0 0 15px rgba(239,68,68,0.4); }
        .texto-offline { color: var(--status-offline); }
        
        .progress-bg { background-color: rgba(128,128,128,0.2); border-radius: 10px; height: 8px; width: 100%; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease, background-color 0.4s ease; }
        
        .chart-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-filtro { background-color: transparent; color: var(--text-muted); border: 1px solid var(--card-border); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; }
        .btn-filtro:hover { color: var(--text-main); border-color: var(--text-muted); }
        .btn-filtro.activo { background-color: var(--accent-blue); color: var(--bg-base); border-color: var(--accent-blue); }
        
        #watermark { display: none; text-align: center; margin-top: 20px; font-weight: 600; color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body id="dashboard-body">

    <div class="header">
        <h1>Centro de Monitoreo Acústico</h1>
        <p>Dashboard de Hardware en la Nube</p>
    </div>

    <!-- CONTROLES COMPLETOS -->
    <div class="global-controls" data-html2canvas-ignore="true">
        <div class="control-umbral" title="El nivel Moderado se ajustará automáticamente 10dB por debajo de este valor">
            Límite Crítico: <input type="number" id="inputUmbral" value="70" onchange="cambiarUmbral(this.value)"> dB
        </div>
        <button id="btnFullscreen" class="btn-control" onclick="toggleFullscreen()">⛶ Pantalla Completa</button>
        <button id="btnTema" class="btn-control" onclick="toggleTema()">☀ Modo Proyector</button>
        <button id="btnAudio" class="btn-control" onclick="toggleAudio()">🔇 Activar Alarmas</button>
        <button class="btn-control" onclick="tomarCaptura()" style="border-color: var(--accent-blue); color: var(--accent-blue);">📸 Capturar Reporte</button>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="card-header">
                <span>NIVEL ACTUAL</span>
                <span id="badgeEstado" class="estado-badge">Buscando...</span>
            </div>
            <div style="display: flex; align-items: baseline; justify-content: center; gap: 10px;">
                <div id="ruidoActual" class="valor-principal">--</div>
                <div style="display: flex; flex-direction: column; align-items: flex-start;">
                    <span class="unidad" style="font-size: 1.2rem;">dB</span>
                    <span id="tendencia" style="font-size: 0.8rem; font-weight: bold;">--</span>
                </div>
            </div>
            <div class="progress-bg"><div id="barraRuido" class="progress-fill"></div></div>
            <div id="textoActualizacion" style="color: var(--text-muted); font-size: 0.75rem; margin-top: 10px; text-align: center;">Sincronizando...</div>
        </div>

        <div class="card">
            <div class="card-header"><span>PROMEDIO</span><span style="color: var(--accent-blue); font-size: 1.8rem; font-weight: 800;">~</span></div>
            <div><span id="promedioRuido" class="valor-secundario">--</span><span class="unidad"> dB</span></div>
        </div>

        <div class="card">
            <div class="card-header"><span>PICO MÁXIMO</span><span style="color: var(--status-yellow); font-size: 1.5rem; font-weight: 800;">↗</span></div>
            <div><span id="picoMaximo" class="valor-secundario">--</span><span class="unidad"> dB</span></div>
        </div>

        <div class="card">
            <div class="card-header"><span>EXPOSICIÓN ALTA</span><span style="color: var(--status-red); font-size: 1.5rem;">⚠</span></div>
            <div>
                <span id="excesosTotales" class="valor-secundario">--</span><span class="unidad"> ev</span> 
                <span style="color:var(--text-muted);">|</span> 
                <span id="tiempoExposicion" class="valor-secundario" style="font-size: 1.5rem;">--</span>
            </div>
        </div>

        <div class="graficos-container">
            <div class="card chart-card">
                <div class="card-header">
                    <span>TENDENCIA HISTÓRICA</span>
                    <div class="chart-controls" data-html2canvas-ignore="true">
                        <button class="btn-filtro activo" onclick="cambiarFiltro(30, this)">Vivo</button>
                        <button class="btn-filtro" onclick="cambiarFiltro(300, this)">15 Min</button>
                        <button class="btn-filtro" onclick="cambiarFiltro(1000, this)">1 Hora</button>
                    </div>
                </div>
                <div class="chart-container"><canvas id="graficoRuido"></canvas></div>
            </div>

            <div class="card chart-card">
                <div class="card-header">
                    <span>DISTRIBUCIÓN</span>
                </div>
                <div class="chart-container"><canvas id="graficoDona"></canvas></div>
            </div>
        </div>
    </div>
    
    <div id="watermark"></div>

    <script>
        const username = "DylanPointis";
        const feed = "tpsemafororuido";
        
        let limiteGrafico = 30; 
        let limiteTolerancia = 70; 
        let chartRuido;
        let chartDona;
        let datasetHistorico = []; 
        let audioHabilitado = false;
        let audioCtx = null;
        let tituloOriginal = document.title;
        let intervaloTitulo = null;
        let enAlerta = false;

        function cambiarUmbral(valor) {
            limiteTolerancia = parseInt(valor);
            obtenerDatosYActualizar(); 
        }

        function toggleTema() {
            document.body.classList.toggle('light-theme');
            const btn = document.getElementById('btnTema');
            if (document.body.classList.contains('light-theme')) {
                btn.innerHTML = "🌙 Modo Oscuro";
                Chart.defaults.color = '#475569';
            } else {
                btn.innerHTML = "☀ Modo Proyector";
                Chart.defaults.color = '#94a3b8';
            }
            if(chartRuido) {
                chartRuido.options.scales.y.grid.color = document.body.classList.contains('light-theme') ? '#e2e8f0' : '#1e293b';
                chartRuido.update('none');
            }
        }

        function tomarCaptura() {
            const wm = document.getElementById('watermark');
            const ahora = new Date();
            wm.innerText = `Reporte Oficial - Semáforo de Silencio UAI - Generado el ${ahora.toLocaleDateString()} a las ${ahora.toLocaleTimeString()} - Grupo: Pointis, Bravo, Lambezat, Gomez`;
            wm.style.display = 'block';
            
            html2canvas(document.getElementById('dashboard-body'), {
                backgroundColor: window.getComputedStyle(document.body).backgroundColor
            }).then(canvas => {
                wm.style.display = 'none';
                const link = document.createElement('a');
                link.download = `Reporte_Acustico_${ahora.getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
                document.getElementById('btnFullscreen').innerHTML = "✖ Salir Pantalla Completa";
            } else {
                document.exitFullscreen();
                document.getElementById('btnFullscreen').innerHTML = "⛶ Pantalla Completa";
            }
        }

        function toggleAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioHabilitado = !audioHabilitado;
            const btn = document.getElementById('btnAudio');
            if (audioHabilitado) {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                btn.innerHTML = "🔊 Alarmas Activadas";
                btn.classList.add('activo');
            } else {
                btn.innerHTML = "🔇 Activar Alarmas";
                btn.classList.remove('activo');
                detenerAlertaVisual();
            }
        }

        function emitirBeep() {
            if (!audioHabilitado || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15); 
        }

        function manejarAlertas(valor) {
            if (valor >= limiteTolerancia) {
                if (!enAlerta) {
                    enAlerta = true;
                    document.body.classList.add('alerta-critica');
                    intervaloTitulo = setInterval(() => {
                        document.title = document.title === tituloOriginal ? "⚠️ [CRÍTICO] Exceso Ruido" : tituloOriginal;
                    }, 500);
                }
                emitirBeep(); 
            } else {
                if (enAlerta) detenerAlertaVisual();
            }
        }

        function detenerAlertaVisual() {
            enAlerta = false;
            document.body.classList.remove('alerta-critica');
            clearInterval(intervaloTitulo);
            document.title = tituloOriginal;
        }

        function calcularMetricas(valores) {
            if(valores.length === 0) return;
            const suma = valores.reduce((a, b) => a + b, 0);
            document.getElementById('promedioRuido').innerText = Math.round(suma / valores.length);
            document.getElementById('picoMaximo').innerText = Math.max(...valores);
            
            const eventosCriticos = valores.filter(v => v >= limiteTolerancia).length;
            document.getElementById('excesosTotales').innerText = eventosCriticos;
            
            const segundosTotales = eventosCriticos * 3;
            const min = Math.floor(segundosTotales / 60);
            const sec = segundosTotales % 60;
            document.getElementById('tiempoExposicion').innerText = min > 0 ? `${min}m ${sec}s` : `${sec}s`;
        }

        async function obtenerDatosYActualizar() {
            try {
                const response = await fetch(`https://io.adafruit.com/api/v2/${username}/feeds/${feed}/data?limit=${limiteGrafico}`);
                const data = await response.json();
                
                if (data.length === 0) return; 

                datasetHistorico = data; 
                const valorActual = parseInt(data[0].value);
                const diferenciaSegundos = (new Date() - new Date(data[0].created_at)) / 1000;
                
                const elemTendencia = document.getElementById('tendencia');
                if (data.length > 1) {
                    const valorAnterior = parseInt(data[1].value);
                    if (valorActual > valorAnterior + 2) elemTendencia.innerHTML = '<span style="color:var(--status-red);">↑ Sube</span>';
                    else if (valorActual < valorAnterior - 2) elemTendencia.innerHTML = '<span style="color:var(--status-green);">↓ Baja</span>';
                    else elemTendencia.innerHTML = '<span style="color:var(--status-yellow);">≈ Estable</span>';
                }

                const elemValor = document.getElementById('ruidoActual');
                const badgeEstado = document.getElementById('badgeEstado');
                const barraRuido = document.getElementById('barraRuido');
                const textoActualizacion = document.getElementById('textoActualizacion');

                // Reseteamos las clases de color antes de aplicar las nuevas
                elemValor.className = 'valor-principal';
                elemValor.innerText = valorActual;

                // --- NUEVO CÁLCULO DINÁMICO DE LA BARRA ---
                let pisoBarra = limiteTolerancia > 30 ? 30 : 0;
                let topeBarra = limiteTolerancia + 20; 
                let porcentajeBarra = ((valorActual - pisoBarra) / (topeBarra - pisoBarra)) * 100;
                barraRuido.style.width = `${Math.max(0, Math.min(100, porcentajeBarra))}%`;
                // ------------------------------------------

                // CÁLCULO DINÁMICO DEL LÍMITE MODERADO
                const limiteModerado = limiteTolerancia - 10;

                if (diferenciaSegundos > 15) {
                    elemValor.classList.add('texto-offline');
                    badgeEstado.innerText = "DESCONECTADO";
                    badgeEstado.style.backgroundColor = "transparent";
                    badgeEstado.style.border = "1px solid var(--status-offline)";
                    badgeEstado.style.color = "var(--status-offline)";
                    barraRuido.style.backgroundColor = "var(--status-offline)";
                    textoActualizacion.innerText = `Última señal hace ${Math.round(diferenciaSegundos)} seg.`;
                    detenerAlertaVisual();
                } else {
                    textoActualizacion.innerText = "Sensor Online - Actualizando...";
                    badgeEstado.style.border = "none";
                    manejarAlertas(valorActual);

                    // APLICACIÓN DE COLORES DINÁMICOS
                    if(valorActual >= limiteTolerancia) {
                        elemValor.classList.add('pulsar-rojo');
                        badgeEstado.innerText = "CRÍTICO";
                        badgeEstado.style.backgroundColor = "rgba(239,68,68,0.2)";
                        badgeEstado.style.color = "var(--status-red)";
                        barraRuido.style.backgroundColor = "var(--status-red)";
                    } else if (valorActual >= limiteModerado) {
                        elemValor.classList.add('pulsar-amarillo');
                        badgeEstado.innerText = "MODERADO";
                        badgeEstado.style.backgroundColor = "rgba(245,158,11,0.2)";
                        badgeEstado.style.color = "var(--status-yellow)";
                        barraRuido.style.backgroundColor = "var(--status-yellow)";
                    } else {
                        elemValor.classList.add('pulsar-verde');
                        badgeEstado.innerText = "SILENCIO";
                        badgeEstado.style.backgroundColor = "rgba(16,185,129,0.2)";
                        badgeEstado.style.color = "var(--status-green)";
                        barraRuido.style.backgroundColor = "var(--status-green)";
                    }
                }

                const dataInvertida = [...data].reverse(); 
                const etiquetas = dataInvertida.map(d => {
                    const f = new Date(d.created_at);
                    return `${f.getHours().toString().padStart(2,'0')}:${f.getMinutes().toString().padStart(2,'0')}:${f.getSeconds().toString().padStart(2,'0')}`;
                });
                const valores = dataInvertida.map(d => parseInt(d.value));

                calcularMetricas(valores);
                actualizarGraficos(etiquetas, valores);

            } catch (error) {
                console.error("Error obteniendo datos:", error);
            }
        }

        function actualizarGraficos(etiquetas, valores) {
            Chart.defaults.color = document.body.classList.contains('light-theme') ? '#475569' : '#94a3b8';
            Chart.defaults.font.family = 'Inter';

            const ctxLine = document.getElementById('graficoRuido').getContext('2d');
            if (chartRuido) {
                chartRuido.data.labels = etiquetas;
                chartRuido.data.datasets[0].data = valores;
                chartRuido.update('none'); 
            } else {
                chartRuido = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels: etiquetas,
                        datasets: [{
                            label: 'Nivel de Ruido (dB)', data: valores, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', borderWidth: 2, fill: true, tension: 0.1, pointBackgroundColor: '#0f172a', pointBorderColor: '#38bdf8', pointRadius: limiteGrafico > 100 ? 0 : 3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } }, scales: { y: { min: 30, suggestedMax: 100, grid: { color: document.body.classList.contains('light-theme') ? '#e2e8f0' : '#1e293b' }, border: { display: false } }, x: { grid: { display: false }, border: { display: false }, ticks: { maxTicksLimit: 8 } } } }
                });
            }

            // CALCULO DINÁMICO PARA LA DONA
            let verde = 0, amarillo = 0, rojo = 0;
            const limiteModerado = limiteTolerancia - 10;
            
            valores.forEach(v => {
                if (v >= limiteTolerancia) rojo++;
                else if (v >= limiteModerado) amarillo++;
                else verde++;
            });

            const ctxDona = document.getElementById('graficoDona').getContext('2d');
            if (chartDona) {
                chartDona.data.datasets[0].data = [verde, amarillo, rojo];
                chartDona.update('none');
            } else {
                chartDona = new Chart(ctxDona, {
                    type: 'doughnut',
                    data: {
                        labels: ['Silencio', 'Moderado', 'Crítico'],
                        datasets: [{ data: [verde, amarillo, rojo], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'], borderColor: 'transparent', hoverOffset: 4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { position: 'bottom', labels: { color: Chart.defaults.color, boxWidth: 12, padding: 20 } } }, cutout: '75%' }
                });
            }
        }

        function cambiarFiltro(limite, boton) {
            limiteGrafico = limite;
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('activo'));
            boton.classList.add('activo');
            obtenerDatosYActualizar();
        }

        obtenerDatosYActualizar();
        setInterval(obtenerDatosYActualizar, 3000);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch((err) => console.log('Error PWA.', err)); });
        }
    </script>
</body>
</html>
